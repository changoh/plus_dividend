<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLUS 고배당주 차트</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="etf-badge">ETF</span>
        <div class="title-block">
          <h1 class="etf-name" id="etf-name">PLUS 고배당주</h1>
          <span class="ticker" id="ticker">161510</span>
        </div>
      </div>
      <div class="header-right">
        <div class="stat-card">
          <span class="stat-label">현재가</span>
          <span class="stat-value" id="last-close">—</span>
        </div>
      </div>
    </header>

    <!-- Period buttons -->
    <div class="toolbar">
      <button class="range-btn active" data-period="1y">1년</button>
      <button class="range-btn" data-period="3y">3년</button>
      <button class="range-btn" data-period="5y">5년</button>
      <button class="range-btn" data-period="10y">10년</button>
      <button class="range-btn" data-period="all">전체</button>
    </div>

    <!-- Chart -->
    <div class="chart-wrapper">
      <div id="chart"></div>
      <div id="chart-overlay"></div>
      <div id="selection-band" class="selection-band hidden"></div>
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>데이터 로딩 중…</span>
      </div>
      <div id="tooltip" class="tooltip hidden"></div>
    </div>

    <!-- Scrollbar -->
    <div id="scrollbar-track" class="chart-scrollbar">
      <div id="scrollbar-thumb" class="scrollbar-thumb"></div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <span class="legend-item up">▲ 상승</span>
      <span class="legend-item down">▼ 하락</span>
      <span class="legend-item div">↑ 분배금 지급일</span>
    </div>

    <!-- Investment calculator -->
    <section class="calc-section">
      <h2 class="section-title">투자 수익 계산기</h2>
      <div class="calc-inputs">
        <div class="calc-input-group">
          <div class="calc-label-row">
            <label class="calc-label" for="calc-amount">투자금 (원)</label>
            <div class="calc-presets">
              <button class="calc-preset-btn" data-amount="10000000">1,000만</button>
              <button class="calc-preset-btn" data-amount="50000000">5,000만</button>
              <button class="calc-preset-btn" data-amount="100000000">1억</button>
            </div>
          </div>
          <input id="calc-amount" class="calc-input" type="text" inputmode="numeric" placeholder="10,000,000" />
        </div>
        <div class="calc-input-group">
          <label class="calc-label" for="calc-date">투자 시기</label>
          <input id="calc-date" class="calc-input" type="date" />
        </div>
      </div>
      <div class="calc-results">
        <div class="calc-card">
          <div class="calc-card-label">보유 수량</div>
          <div class="calc-card-value" id="calc-qty">—</div>
          <div class="calc-card-sub" id="calc-qty-sub"></div>
        </div>
        <div class="calc-card">
          <div class="calc-card-label">누적 분배금</div>
          <div class="calc-card-value green" id="calc-divs">—</div>
          <div class="calc-card-sub" id="calc-divs-sub"></div>
        </div>
        <div class="calc-card">
          <div class="calc-card-label">평가손익</div>
          <div class="calc-card-value" id="calc-pnl">—</div>
          <div class="calc-card-sub" id="calc-pnl-sub"></div>
        </div>
        <div class="calc-card calc-card-total">
          <div class="calc-card-label">합산 수익</div>
          <div class="calc-card-value" id="calc-total">—</div>
          <div class="calc-card-sub" id="calc-total-sub"></div>
        </div>
      </div>
    </section>

    <!-- Dividend table -->
    <section class="table-section">
      <h2 class="section-title">분배금 지급 이력</h2>
      <div class="table-wrapper">
        <table id="div-table">
          <thead>
            <tr>
              <th>지급일</th>
              <th>분배금 (원)</th>
              <th>연환산 수익률</th>
            </tr>
          </thead>
          <tbody id="div-tbody">
            <tr><td colspan="3" class="empty">데이터 없음</td></tr>
          </tbody>
        </table>
      </div>
      <div class="expand-wrap">
        <button id="expand-btn" class="expand-btn hidden">▼ 더 보기</button>
        <button id="collapse-btn" class="expand-btn hidden">▲ 접기</button>
      </div>
    </section>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/app.js"></script>
</body>
</html>
